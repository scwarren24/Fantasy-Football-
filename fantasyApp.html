<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Selection</title>
    <link rel="stylesheet" href="fantasyApp.css">
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <table id="playerTable">
                <thead>
                    <tr>
                        <th>Player</th>
                        <th>Proj Total</th>
                        <th>Proj Avg</th>
                        <th>Pos</th>
                        <th>Pos-Rank</th>
                        <th>ESPN $ Value</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Rows will be dynamically added here -->
                </tbody>
            </table>
        </div>
        <div class="right-panel">
            <h2>Selected Players</h2>
            <ul id="selectedList">
                <!-- Selected players will appear here -->
            </ul>
        </div>
    </div>
    <script src="fantasyApp.js"></script>
</body>
</html>
